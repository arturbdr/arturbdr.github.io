skills:
  - name: Java
    summary: "Primary language for 18 years. Java 8 through 17 across Spring Boot microservices, Strangler-pattern monolith extractions, and high-throughput backend platforms."
    categories: ["language", "backend"]

  - name: Kotlin
    summary: "Production Kotlin since 2021 across Spring Boot services at Huspy, GoodHabitz, and Jumbo. JVM idioms, coroutines, and Spring stack."
    categories: ["language", "backend"]

  - name: TypeScript / Node.js
    summary: "NestJS BFFs and microservices at Huspy and Jumbo. Node 18+, strict TypeScript, Clean Architecture patterns."
    categories: ["language", "backend"]

  - name: .NET (6 / 8)
    summary: "Built and modernised .NET services at GoodHabitz including the LTI 1.3 Strangler-pattern rebuild on .NET 6/8."
    categories: ["language", "backend"]

  - name: Spring Boot
    summary: "10+ years of Spring Boot for backend services. Spring Cloud (Feign, ConfigServer, Zuul), Spring Security, JPA, and event-driven patterns."
    categories: ["backend"]

  - name: NestJS
    summary: "Backend-for-Frontend and microservices in NestJS. Modular architecture, dependency injection, and TypeScript-first APIs."
    categories: ["backend"]

  - name: AWS
    summary: "Lambda, S3, RDS, SQS/SNS, CloudFront, Cognito, EC2. Migrations from on-prem and other clouds onto AWS, plus production workloads at Huspy and Jumbo."
    categories: ["cloud"]

  - name: GCP
    summary: "Pub/Sub for async event flows. Built and ran services on GKE / Cloud Run during the GoodHabitz era before the AWS consolidation."
    categories: ["cloud"]

  - name: Terraform
    summary: "Provisioned the AWS infrastructure for the OneCloud migration at GoodHabitz and the Document Service at Huspy. Modules, remote state, plan/apply workflow."
    categories: ["cloud"]

  - name: Kubernetes
    summary: "Production deployments since 2018. Auto-scaling microservices, Helm, kubectl, and the operational glue around them."
    categories: ["cloud"]

  - name: Docker
    summary: "Multi-stage builds, hardened production images, local dev compose stacks across every backend project of the last 8 years."
    categories: ["cloud"]

  - name: PostgreSQL
    summary: "Primary relational store across most projects. Schema design, migrations (Flyway / Liquibase), tuning, and partition strategies for high-write workloads."
    categories: ["data"]

  - name: MongoDB
    summary: "Document-store workloads at Jumbo and Netshoes — including replacing a relational DB that couldn't keep up with read volume."
    categories: ["data"]

  - name: Redis
    summary: "Caching tier in front of slow legacy systems and as a hot-read store for frequently accessed data."
    categories: ["data"]

  - name: Datadog
    summary: "APM, logs, dashboards, and alerting standard set across Huspy, GoodHabitz, Jumbo, Netshoes. Used to drive ~30% Document Service latency wins."
    categories: ["observability"]

  - name: Grafana / CloudWatch
    summary: "Custom dashboards for stakeholder visibility (e.g. Finance team monitoring Salesforce ↔ Backoffice flow at GoodHabitz)."
    categories: ["observability"]
